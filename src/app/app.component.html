<ng-container *ngIf="!isAuthPage; else simpleLayout">
  <div class="d-flex h-100">    
    <div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="closeSidebar()"></div>
    
    <app-sidebar [isOpen]="sidebarOpen" (close)="closeSidebar()"></app-sidebar>
    
    <main class="flex-grow-1 d-flex flex-column overflow-hidden main-content">      
      <app-header (toggleSidebar)="toggleSidebar()"></app-header>
      
      <div class="flex-grow-1 overflow-auto" style="padding: 1.5rem 2rem 2rem;">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</ng-container>

<ng-template #simpleLayout>
  <main class="w-100 h-100 overflow-auto">
    <router-outlet></router-outlet>
  </main>
</ng-template>
