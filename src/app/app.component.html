<div class="d-flex h-100">
  <!-- Mobile Overlay -->
  <div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen">
    <div class="logo-area">
      <div class="bg-accent d-flex align-items-center justify-content-center" style="width: 36px; height: 36px; border-radius: 12px; min-width: 36px;">
        <i class="bi bi-flower3 text-white" style="font-size: 1.1rem;"></i>
      </div>
      <span class="logo-text fw-bold" style="font-size: 1rem; color: var(--ht-text);">HabitTrack</span>
    </div>

    <nav class="flex-grow-1 overflow-auto">
      <div class="px-3 mb-2" style="min-height: 16px;">
        <span class="link-text" style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ht-text-light); font-weight: 600;">Menú</span>
      </div>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link" (click)="closeSidebar()">
        <i class="bi bi-grid-1x2"></i>
        <span class="link-text">Dashboard</span>
      </a>
      <a routerLink="/my-habits" routerLinkActive="active" class="nav-link" (click)="closeSidebar()">
        <i class="bi bi-check2-circle"></i>
        <span class="link-text">Mis hábitos</span>
      </a>
      <a routerLink="/analytics" routerLinkActive="active" class="nav-link" (click)="closeSidebar()">
        <i class="bi bi-bar-chart-line"></i>
        <span class="link-text">Estadísticas</span>
      </a>
      <a routerLink="/settings" routerLinkActive="active" class="nav-link" (click)="closeSidebar()">
        <i class="bi bi-sliders"></i>
        <span class="link-text">Ajustes</span>
      </a>
    </nav>

    <div class="mt-auto px-3 pt-3" style="border-top: 1.5px solid var(--ht-border);">
      <div class="dropdown">
        <button class="btn btn-ghost w-100 p-2 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
          <img src="https://ui-avatars.com/api/?name=Alex+Rivera&background=F5F0EB&color=9B9590&rounded=true&bold=true" alt="User" class="rounded-circle" width="32" height="32" style="min-width: 32px;">
          <div class="flex-grow-1 overflow-hidden link-text" style="text-align: left;">
            <div class="text-truncate small fw-semibold" style="color: var(--ht-text);">Alex Rivera</div>
            <div class="text-truncate" style="font-size: 0.7rem; color: var(--ht-text-muted);">alex&#64;ejemplo.com</div>
          </div>
        </button>
        <ul class="dropdown-menu shadow border-0 py-1">
          <li><a class="dropdown-item py-2" href="#"><i class="bi bi-person me-2"></i> Perfil</a></li>
          <li><a class="dropdown-item py-2 text-danger" href="#"><i class="bi bi-box-arrow-right me-2"></i> Cerrar sesión</a></li>
        </ul>
      </div>
    </div>
  </aside>

  <!-- Content Area -->
  <main class="flex-grow-1 d-flex flex-column overflow-hidden main-content">
    <!-- Header -->
    <header class="top-header">
      <div class="d-flex align-items-center gap-3">
        <!-- Hamburger Button — Mobile only -->
        <button class="btn btn-ghost d-md-none p-1" (click)="toggleSidebar()" aria-label="Toggle menu">
          <i class="bi bi-list" style="font-size: 1.4rem; color: var(--ht-text);"></i>
        </button>
        <div>
          <div class="fw-semibold" style="font-size: 0.9375rem;">Buenos días, Alex 👋</div>
          <div style="font-size: 0.75rem; color: var(--ht-text-muted);">Miércoles, 19 de marzo</div>
        </div>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-ghost position-relative" style="padding: 0.4rem 0.6rem;">
          <i class="bi bi-bell" style="font-size: 1.1rem; color: var(--ht-text-muted);"></i>
          <span class="position-absolute rounded-circle bg-accent" style="width: 7px; height: 7px; top: 8px; right: 8px;"></span>
        </button>
        <div class="rounded-circle overflow-hidden" style="width: 34px; height: 34px; border: 2px solid var(--ht-border);">
          <img src="https://ui-avatars.com/api/?name=Alex+Rivera&background=F5F0EB&color=9B9590&size=34" alt="Avatar" style="width: 100%; height: 100%;">
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <div class="flex-grow-1 overflow-auto" style="padding: 1.5rem 2rem 2rem;">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
