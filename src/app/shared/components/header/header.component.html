<header class="top-header">
  <div class="d-flex align-items-center gap-3">
    <!-- Hamburger Button — Mobile only -->
    <button class="btn btn-ghost d-md-none p-1" (click)="onToggle()" aria-label="Toggle menu">
      <i class="bi bi-list" style="font-size: 1.4rem; color: var(--ht-text);"></i>
    </button>
    <div>
      <div class="fw-semibold" style="font-size: 1rem;">Buenos días, Alex 👋</div>
      <div style="font-size: 0.8rem; color: var(--ht-text-muted);">Miércoles, 19 de marzo</div>
    </div>
  </div>
  <div class="d-flex align-items-center gap-3">
    <button class="btn btn-ghost position-relative" style="padding: 0.4rem 0.6rem;">
      <i class="bi bi-bell" style="font-size: 1.1rem; color: var(--ht-text-muted);"></i>
      <span class="position-absolute rounded-circle bg-accent" style="width: 7px; height: 7px; top: 8px; right: 8px;"></span>
    </button>
    <div class="rounded-circle overflow-hidden" style="width: 34px; height: 34px; border: 2px solid var(--ht-border);">
      <img src="https://ui-avatars.com/api/?name=Alex+Rivera&background=F5F0EB&color=9B9590&size=34" alt="Avatar" style="width: 100%; height: 100%;">
    </div>
  </div>
</header>
