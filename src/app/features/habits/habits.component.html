<div class="container-fluid p-0">
  <!-- Page Header -->
  <div class="d-flex justify-content-end align-items-end mb-4">
    <button class="btn btn-primary d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#createHabitModal" (click)="openModal()">
      <i class="bi bi-plus"></i> Crear Hábito
    </button>
  </div>

  <!-- Habits Grid -->
  <div class="row g-4">
    <div class="col-md-6 col-xl-4" *ngFor="let habit of [
      {name: 'Lectura de Arquitectura', cat: 'Productividad', freq: 'Diario', streak: '12d', rate: '85%', color: 'lavender', badgeClass: 'badge-lavender'},
      {name: 'Sprint de Codificación', cat: 'Desarrollo', freq: 'Diario', streak: '8d', rate: '100%', color: 'sage', badgeClass: 'badge-sage'},
      {name: 'Entrenamiento Físico', cat: 'Salud', freq: 'Lu, Mi, Vi', streak: '24d', rate: '92%', color: 'sky', badgeClass: 'badge-sky'},
      {name: 'Meditación', cat: 'Mental', freq: 'Diario', streak: '15d', rate: '100%', color: 'peach', badgeClass: 'badge-peach'}
    ]">
      <div class="card h-100 p-4" [style.border-left]="'4px solid var(--ht-' + habit.color + ')'">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <div class="kpi-icon" [style.background]="'var(--ht-' + habit.color + ')'">
            <i class="bi bi-bookmark-star" style="color: var(--ht-text-muted);"></i>
          </div>
          <div class="dropdown">
            <button class="btn btn-ghost p-1" type="button" data-bs-toggle="dropdown">
              <i class="bi bi-three-dots" style="color: var(--ht-text-muted);"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="#"><i class="bi bi-pencil me-2"></i> Editar</a></li>
              <li><a class="dropdown-item text-danger" href="#"><i class="bi bi-trash me-2"></i> Eliminar</a></li>
            </ul>
          </div>
        </div>

        <h3 class="h6 fw-bold mb-1">{{habit.name}}</h3>
        <div class="mb-3" style="font-size: 0.8125rem; color: var(--ht-text-muted);">{{habit.cat}} · {{habit.freq}}</div>

        <div class="row g-2 mb-4">
          <div class="col-6">
            <div class="p-2 rounded-3 text-center" style="background: var(--ht-cream);">
              <div style="font-size: 0.625rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ht-text-muted);">Racha</div>
              <div class="fw-bold">{{habit.streak}}</div>
            </div>
          </div>
          <div class="col-6">
            <div class="p-2 rounded-3 text-center" style="background: var(--ht-cream);">
              <div style="font-size: 0.625rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ht-text-muted);">Tasa</div>
              <div class="fw-bold">{{habit.rate}}</div>
            </div>
          </div>
        </div>

        <div class="mt-auto">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <span style="font-size: 0.75rem; color: var(--ht-text-muted); font-weight: 500;">Progreso</span>
            <span style="font-size: 0.75rem; color: var(--ht-accent); font-weight: 600;">{{habit.rate}}</span>
          </div>
          <div class="progress">
            <div class="progress-bar progress-accent" role="progressbar" [style.width]="habit.rate"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Habit Modal -->
  <div class="modal fade" id="createHabitModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pt-4 px-4 pb-2">
          <h5 class="modal-title fw-bold">Crear Nuevo Hábito</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4">
          <form>
            <div class="mb-3">
              <label class="form-label">Nombre del Hábito</label>
              <input type="text" class="form-control" placeholder="Ej: Leer 30 min">
            </div>
            <div class="mb-3">
              <label class="form-label">Categoría</label>
              <select class="form-select">
                <option>Productividad</option>
                <option>Salud</option>
                <option>Desarrollo</option>
                <option>Mental</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label">Frecuencia</label>
              <div class="d-flex gap-2">
                <button type="button" class="btn btn-primary flex-grow-1">Diario</button>
                <button type="button" class="btn btn-outline-secondary flex-grow-1">Semanal</button>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label d-block">Color</label>
              <div class="d-flex gap-2">
                <div class="rounded-circle" style="width: 28px; height: 28px; background: var(--ht-lavender); cursor: pointer; border: 2px solid transparent;"></div>
                <div class="rounded-circle" style="width: 28px; height: 28px; background: var(--ht-sage); cursor: pointer; border: 2px solid transparent;"></div>
                <div class="rounded-circle" style="width: 28px; height: 28px; background: var(--ht-peach); cursor: pointer; border: 2px solid transparent;"></div>
                <div class="rounded-circle" style="width: 28px; height: 28px; background: var(--ht-sky); cursor: pointer; border: 2px solid transparent;"></div>
                <div class="rounded-circle" style="width: 28px; height: 28px; background: var(--ht-rose); cursor: pointer; border: 2px solid transparent;"></div>
              </div>
            </div>
            <div class="d-flex gap-2 mt-4">
              <button type="button" class="btn btn-outline-secondary w-100 fw-semibold" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary w-100 fw-semibold">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
   <!-- Modal Overlay -->
  <div class="custom-modal-overlay" *ngIf="isModalOpen" (click)="closeModal()">
    <!-- Modal Content -->
    <div class="custom-modal-content card" (click)="$event.stopPropagation()">
      <div class="modal-header border-0 pb-0 d-flex justify-content-between align-items-center mb-3">
        <h4 class="h5 fw-bold mb-0">Crear Nuevo Hábito</h4>
        <button type="button" class="btn-ghost rounded-circle border-0 d-flex justify-content-center align-items-center" (click)="closeModal()" style="width: 32px; height: 32px; padding: 0;">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      
      <div class="modal-body py-2">
        <form>
          <div class="mb-3">
            <label class="form-label" >Nombre del Hábito</label>
            <input type="text" class="form-control" placeholder="Ej. Leer 20 páginas"  name="nombre" [(ngModel)]="nombre">
          </div>
          
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label d-flex align-items-center gap-2">
                Categoría
                <div class="rounded-circle transition-all" [style.background]="getCategoryColor()" style="width: 14px; height: 14px; transition: background 0.3s ease;"></div>
              </label>
              <select class="form-select" #catSelect (change)="categoria = catSelect.value" name="categoria" [(ngModel)]="categoria">
                <option value="Productividad" selected>Productividad</option>
                <option value="Salud">Salud</option>
                <option value="Mental">Mental</option>
                <option value="Desarrollo">Desarrollo</option>                
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Frecuencia</label>
              <select class="form-select" #freqSelect (change)="frecuencia = freqSelect.value" name="frecuencia" [(ngModel)]="frecuencia">
                <option value="Diario" selected>Diario</option>
                <option value="Semanal">Semanal</option>
                <option value="Personalizado">Personalizado</option>
              </select>
            </div>
          </div>

          <div class="mb-3 custom-days-animation" *ngIf="frecuencia === 'Personalizado'">
            <label class="form-label d-block">Días de la semana</label>
            <div class="d-flex justify-content-between gap-1">
              <button type="button" *ngFor="let dia of diasSemana" 
                      class="btn d-flex align-items-center justify-content-center fw-bold transition-all" 
                      [ngClass]="diasSeleccionados.includes(dia) ? 'btn-primary text-white border-0' : 'btn-outline-secondary'"
                      style="width: 38px; height: 38px; border-radius: 50%; padding: 0;"
                      (click)="toggleDia(dia)">
                {{ dia }}
              </button>
            </div>
          </div>

          <div class="mb-4 mt-2">
            <label class="form-label">Descripción o Notas (Opcional)</label>
            <textarea class="form-control" rows="2" placeholder="Agrega más detalles sobre tu hábito..." name="descripcion" [(ngModel)]="descripcion"></textarea>
          </div>
          
          <div class="d-flex justify-content-end gap-2 mt-4">
            <button type="button" class="btn btn-outline-secondary px-4" (click)="closeModal()">Cancelar</button>
            <button type="button" class="btn btn-primary px-4 fw-semibold text-white" (click)="crearHabito()">Guardar Hábito</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
